<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Leveling: Shadow Monarch Gauntlet</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #030611; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00d2ff; }
        
        body {
            background-color: #030611;
            background-image: radial-gradient(circle at 50% 20%, #0c1530 0%, #030611 70%);
            color: #f1f5f9;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            letter-spacing: 0.5px;
            overflow-x: hidden;
        }

        /* Interactive Start Menu Overlay */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #030611;
            background-image: radial-gradient(circle at 50% 40%, #0d1a3d 0%, #02040a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
            padding: 20px;
        }
        #start-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            color: #00d2ff;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.7);
            margin-bottom: 25px;
            letter-spacing: 6px;
            text-align: center;
            line-height: 1.2;
        }
        .auth-input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            max-width: 320px;
            margin-bottom: 12px;
        }
        .auth-input-group label {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: #38bdf8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .auth-field {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid #1e3a8a;
            padding: 12px;
            border-radius: 6px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: bold;
            outline: none;
            transition: all 0.2s;
            width: 100%;
        }
        .auth-field:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }
        .auth-btn-row {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 320px;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .auth-btn {
            text-align: center;
            justify-content: center;
            padding: 12px 10px;
            font-size: 13px;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(180deg, #090d16 0%, #0f172a 100%);
            border: 1px solid #334155;
            color: #cbd5e1;
            width: 100%;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: block;
        }
        .auth-btn.primary {
            background: linear-gradient(180deg, #1e1b4b 0%, #4f46e5 100%);
            border-color: #818cf8;
            color: #fff;
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.4);
        }
        .auth-btn:hover {
            border-color: #00d2ff;
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.4);
        }
        #auth-error-msg {
            color: #ef4444;
            font-size: 13px;
            font-family: monospace;
            margin-bottom: 10px;
            text-align: center;
            max-width: 300px;
            min-height: 18px;
        }
        #start-info-box {
            width: 100%;
            max-width: 450px;
            background: rgba(6, 11, 28, 0.85);
            border: 1px solid #1e3a8a;
            border-radius: 8px;
            padding: 15px;
            font-size: 13px;
            color: #cbd5e1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #start-info-box h4 {
            font-family: 'Orbitron', sans-serif;
            color: #ffbc00;
            margin-bottom: 6px;
            text-align: center;
            font-size: 13px;
        }
        #start-info-box ul { list-style: none; }
        #start-info-box li { margin-bottom: 4px; text-align: left; line-height: 1.4; }

        /* Game UI Layout Styling */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
            margin-bottom: 25px;
            font-size: 32px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        #hud-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            max-width: 1000px;
            background: linear-gradient(135deg, rgba(8, 14, 36, 0.95) 0%, rgba(3, 6, 17, 0.95) 100%);
            border: 1px solid #1e40af;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.15), inset 0 0 15px rgba(30, 64, 175, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            gap: 20px;
            position: relative;
        }
        #hud-container::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #00d2ff, transparent);
        }
        .hud-column { display: flex; flex-direction: column; gap: 8px; font-size: 15px; font-weight: 700; text-transform: uppercase;}
        .hud-val { color: #00d2ff; text-shadow: 0 0 5px rgba(0,210,255,0.3); }
        .hud-column:nth-child(2) { align-items: center; justify-content: center; font-size: 26px; font-weight: 900; color: #ffbc00; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px rgba(255,188,0,0.4); text-align: center; line-height: 1.2;}
        .hud-column:nth-child(3) { align-items: flex-end; }
        
        #combat-view {
            width: 100%;
            max-width: 1000px;
            height: 180px;
            background: #02040a;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        #combat-view h3 { font-family: 'Orbitron', sans-serif; font-size: 13px; color: #ef4444; border-bottom: 1px solid #1e293b; padding-bottom: 6px; letter-spacing: 1px; display: flex; justify-content: space-between;}
        #combat-log { font-size: 13px; color: #94a3b8; overflow-y: auto; flex-grow: 1; font-family: monospace; white-space: pre-wrap; line-height: 1.4; }

        /* Interactive Active Combat Arena View */
        #arena-3d-box {
            width: 100%;
            max-width: 1000px;
            height: 140px;
            background: #060b1e;
            border: 1px dashed #1e40af;
            border-radius: 8px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #player-avatar {
            position: absolute;
            width: 24px; height: 24px;
            background: #00d2ff;
            border-radius: 50%;
            box-shadow: 0 0 12px #00d2ff;
            top: 50%; left: 30%;
            transform: translate(-50%, -50%);
            transition: left 0.1s ease, top 0.1s ease;
        }
        #enemy-avatar {
            position: absolute;
            width: 28px; height: 28px;
            background: #ef4444;
            border-radius: 4px;
            box-shadow: 0 0 12px #ef4444;
            top: 50%; left: 75%;
            transform: translate(-50%, -50%);
        }
        .shadow-minion-graphic {
            position: absolute;
            width: 14px; height: 14px;
            background: #a855f7;
            border-radius: 50%;
            box-shadow: 0 0 8px #a855f7;
            opacity: 0.8;
        }
        #arena-input-hint {
            position: absolute;
            bottom: 8px; left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #64748b;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            text-align: center;
        }

        #controls-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            width: 100%;
            max-width: 1000px;
            gap: 15px;
        }
        .control-panel {
            background: rgba(6, 11, 28, 0.85);
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        .control-panel h3 { font-family: 'Orbitron', sans-serif; font-size: 13px; color: #38bdf8; border-bottom: 1px solid #1e293b; padding-bottom: 8px; text-align: center; letter-spacing: 1px;}
        
        .scrollable-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
