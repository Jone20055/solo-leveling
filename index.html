<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Leveling: Shadow Monarch Gauntlet</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #030611; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00d2ff; }
        
        body {
            background-color: #030611;
            background-image: radial-gradient(circle at 50% 20%, #0c1530 0%, #030611 70%);
            color: #f1f5f9;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            letter-spacing: 0.5px;
            overflow-x: hidden;
        }

        /* Fixed Full Screen Overlay for Start / Login Portal */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #030611;
            background-image: radial-gradient(circle at 50% 40%, #0d1a3d 0%, #02040a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
            padding: 20px;
        }
        
        #start-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            color: #00d2ff;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.7);
            margin-bottom: 30px;
            letter-spacing: 6px;
            text-align: center;
            line-height: 1.3;
        }

        .auth-input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            max-width: 320px;
            margin-bottom: 15px;
        }
        .auth-input-group label {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: #38bdf8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .auth-field {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid #1e3a8a;
            padding: 12px;
            border-radius: 6px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: bold;
            outline: none;
            transition: all 0.2s;
            text-align: center;
        }
        .auth-field:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        .auth-btn-row {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 320px;
            margin-top: 10px;
            margin-bottom: 25px;
        }
        .auth-btn {
            background: linear-gradient(180deg, #1e1b4b 0%, #4f46e5 100%);
            color: #fff;
            border: 1px solid #818cf8;
            padding: 14px 20px;
            font-size: 13px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.4);
            transition: all 0.2s ease;
            width: 100%;
            text-align: center;
        }
        .auth-btn:hover {
            border-color: #00d2ff;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
            transform: scale(1.03);
        }
        #auth-error-msg {
            color: #ef4444;
            font-size: 13px;
            font-family: monospace;
            margin-bottom: 15px;
            min-height: 18px;
        }

        #start-info-box {
            width: 100%;
            max-width: 450px;
            background: rgba(6, 11, 28, 0.7);
            border: 1px dashed #1e3a8a;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.6;
        }
        #start-info-box h4 { font-family: 'Orbitron', sans-serif; color: #38bdf8; margin-bottom: 6px; font-size: 12px; text-align: center; letter-spacing: 1px;}
        #start-info-box ul { list-style: none; }

        /* HUD Dashboard Elements */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
            margin-bottom: 25px;
            font-size: 32px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        #hud-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            max-width: 1000px;
            background: linear-gradient(135deg, rgba(8, 14, 36, 0.95) 0%, rgba(3, 6, 17, 0.95) 100%);
            border: 1px solid #1e40af;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.15), inset 0 0 15px rgba(30, 64, 175, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            gap: 20px;
            position: relative;
        }
        #hud-container::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #00d2ff, transparent);
        }
        .hud-column { display: flex; flex-direction: column; gap: 8px; font-size: 15px; font-weight: 700; text-transform: uppercase;}
        .hud-val { color: #00d2ff; text-shadow: 0 0 5px rgba(0,210,255,0.3); }
        .hud-column:nth-child(2) { align-items: center; justify-content: center; font-size: 26px; font-weight: 900; color: #ffbc00; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px rgba(255,188,0,0.4); text-align: center; line-height: 1.2;}
        .hud-column:nth-child(3) { align-items: flex-end; }
        
        #combat-view {
            width: 100%;
            max-width: 1000px;
            height: 180px;
            background: #02040a;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        #combat-view h3 { font-family: 'Orbitron', sans-serif; font-size: 13px; color: #ef4444; border-bottom: 1px solid #1e293b; padding-bottom: 6px; letter-spacing: 1px; display: flex; justify-content: space-between;}
        #combat-log { font-size: 13px; color: #94a3b8; overflow-y: auto; flex-grow: 1; font-family: monospace; white-space: pre-wrap; line-height: 1.4; }

        #controls-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            width: 100%;
            max-width: 1000px;
            gap: 15px;
        }
        .control-panel {
            background: rgba(6, 11, 28, 0.85);
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        .control-panel h3 { font-family: 'Orbitron', sans-serif; font-size: 13px; color: #38bdf8; border-bottom: 1px solid #1e293b; padding-bottom: 8px; text-align: center; letter-spacing: 1px;}
        
        .scrollable-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 4px;
        }

        button {
            background: linear-gradient(180deg, #0f172a 0%, #090d16 100%);
            color: #cbd5e1;
            border: 1px solid #334155;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            transition: all 0.2s ease;
            width: 100%;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button:hover { background: #1e293b; border-color: #00d2ff; color: #fff; box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); transform: translateY(-1px); }
        
        .stat-count { color: #38bdf8; font-family: monospace; background: rgba(56,189,248,0.1); padding: 2px 6px; border-radius: 4px;}

        #btn-gate {
            background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%); 
            border-color: #4f46e5; 
            text-align: center;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            padding: 15px 10px;
            margin-top: auto;
            display: block;
            text-shadow: 0 0 5px rgba(255,255,255,0.4);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        #btn-gate:hover { background: #3730a3; border-color: #6366f1; box-shadow: 0 0 15px rgba(99, 102, 241, 0.6); }

        #army-poster {
            width: 100%;
            max-width: 1000px;
            background: rgba(6, 11, 28, 0.6);
            border: 1px dashed #334155;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.5;
        }
        #lbl-army { color: #a855f7; font-weight: 700; }

        #info-system-poster {
            width: 100%;
            max-width: 1000px;
