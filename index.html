<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Leveling: Shadow Monarch Gauntlet</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #030611; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00d2ff; }
        
        body {
            background-color: #030611;
            background-image: radial-gradient(circle at 50% 20%, #0c1530 0%, #030611 70%);
            color: #f1f5f9;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            letter-spacing: 0.5px;
            overflow-x: hidden;
        }

        /* 🌟 FIXED SPLASH MENU SCREEN OVERLAY */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #030611;
            background-image: radial-gradient(circle at 50% 40%, #0d1a3d 0%, #02040a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
        #start-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 38px;
            font-weight: 900;
            color: #00d2ff;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.7);
            margin-bottom: 25px;
            letter-spacing: 6px;
            text-align: center;
            line-height: 1.2;
        }

        /* ACCOUNT MANAGER LAYOUT */
        .auth-input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            max-width: 320px;
            margin-bottom: 12px;
        }
        .auth-input-group label {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: #38bdf8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .auth-field {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid #1e3a8a;
            padding: 12px;
            border-radius: 6px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: bold;
            outline: none;
            width: 100%;
        }
        .auth-btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 320px;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .auth-btn {
            background: linear-gradient(180deg, #0f172a 0%, #090d16 100%);
            color: #cbd5e1;
            border: 1px solid #334155;
            padding: 12px 5px;
            font-size: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
        }
        .auth-btn.primary {
            background: linear-gradient(180deg, #1e1b4b 0%, #4f46e5 100%);
            border-color: #818cf8;
            color: #fff;
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.4);
        }
        .auth-btn:hover { border-color: #00d2ff; color: #fff; }
        #auth-error-msg { color: #ef4444; font-size: 13px; font-family: monospace; margin-bottom: 12px; text-align: center; }

        #start-info-box {
            background: rgba(6, 11, 28, 0.7);
            border: 1px dashed #1e3a8a;
            padding: 12px;
            border-radius: 6px;
            max-width: 400px;
            font-size: 12px;
            color: #94a3b8;
        }
        #start-info-box h4 { font-family: 'Orbitron', sans-serif; color: #38bdf8; text-align: center; margin-bottom: 6px; }
        #start-info-box ul { list-style: none; }
        #start-info-box li { margin-bottom: 4px; line-height: 1.3; }

        /* MAIN HUD DASHBOARD */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
            margin-bottom: 25px;
            font-size: 32px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        #hud-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            max-width: 1000px;
            background: linear-gradient(135deg, rgba(8, 14, 36, 0.95) 0%, rgba(3, 6, 17, 0.95) 100%);
            border: 1px solid #1e40af;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.15);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            gap: 20px;
        }
        .hud-column { display: flex; flex-direction: column; gap: 8px; font-size: 15px; font-weight: 700; text-transform: uppercase;}
        .hud-val { color: #00d2ff; }
        .hud-column:nth-child(2) { align-items: center; justify-content: center; font-size: 26px; font-weight: 900; color: #ffbc00; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px rgba(255,188,0,0.4); text-align: center; }
        .hud-column:nth-child(3) { align-items: flex-end; }
        
        #combat-view {
            width: 100%;
            max-width: 1000px;
            height: 180px;
            background: #02040a;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #combat-view h3 { font-family: 'Orbitron', sans-serif; font-size: 13px; color: #ef4444; border-bottom: 1px solid #1e293b; padding-bottom: 6px; display: flex; justify-content: space-between;}
        #combat-log { font-size: 13px; color: #94a3b8; overflow-y: auto; flex-grow: 1; font-family: monospace; white-space: pre-wrap; }

        /* CORE GRID PANELS */
        #controls-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            width: 100%;
            max-width: 1000px;
            gap: 15px;
        }
        .control-panel {
            background: rgba(6, 11, 28, 0.85);
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .control-panel h3 { font-family: 'Orbitron', sans-serif; font-size: 13px; color: #38bdf8; border-bottom: 1px solid #1e293b; padding-bottom: 8px; text-align: center;}
        
        .scrollable-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 280px;
            overflow-y: auto;
        }

        button {
            background: linear-gradient(180deg, #0f172a 0%, #090d16 100%);
            color: #cbd5e1;
            border: 1px solid #334155;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        button:hover { background: #1e293b; border-color: #00d2ff; color: #fff; box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }
        
        .stat-btn { color: #f1f5f9; }
        .stat-count { color: #38bdf8; font-family: monospace; background: rgba(56,189,248,0.1); padding: 2px 6px; border-radius: 4px;}

        #btn-gate {
            background: linear-gradient(180deg, #1e1b4b 0%, #312e81 100%); 
            border-color: #4f46e5; 
            text-align: center;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            padding: 15px 10px;
            margin-top: auto;
            display: block;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        #btn-gate:hover { background: #3730a3; border-color: #6366f1; box-shadow: 0 0 15px rgba(99, 102, 241, 0.6); }

        #army-poster {
            width: 100%;
            max-width: 1000px;
            background: rgba(6, 11, 28, 0.6);
            border: 1px dashed #334155;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            color: #94a3b8;
        }
        #lbl-army { color: #a855f7; font-weight: 700; }

        #info-system-poster {
            width: 100%;
            max-width: 1000px;
            background: linear-gradient(180deg, rgba(10, 15, 30, 0.85) 0%, rgba(3, 6, 17, 0.85) 100%);
            border: 1px solid #1e3a8a;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            font-size: 13px;
            color: #cbd5e1;
        }
        .poster-sec h4 { font-family: 'Orbitron', sans-serif; color: #00d2ff; margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid rgba(0,210,255,0.2); padding-bottom: 4px;}
        .poster-sec ul { list-style: none; }
        .poster-sec li { margin-bottom: 4px; display: flex; justify-content: space-between;}
        .recipe-val { color: #a855f7; font-weight: bold;}
    </style>
</head>
<body>

    <!-- 🌟 FIXED SPLASH MENU SCREEN OVERLAY -->
    <div id="start-screen">
