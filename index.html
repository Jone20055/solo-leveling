<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Leveling: Shadow Monarch Gauntlet</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #030611; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00d2ff; }
        body {
            background-color: #030611;
            background-image: radial-gradient(circle at 50% 20%, #0c1530 0%, #030611 70%);
            color: #f1f5f9;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            letter-spacing: 0.5px;
            overflow-x: hidden;
        }

        /* Fixed Interactive Overlay Landing Portal Screen */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #030611;
            background-image: radial-gradient(circle at 50% 40%, #0d1a3d 0%, #02040a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
            padding: 20px;
        }
        #start-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 38px;
            font-weight: 900;
            color: #00d2ff;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.7);
            margin-bottom: 25px;
            letter-spacing: 6px;
            text-align: center;
            line-height: 1.3;
        }
        .auth-container {
            width: 100%;
            max-width: 340px;
            background: rgba(6, 11, 28, 0.85);
            border: 1px solid #1e40af;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .auth-input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            margin-bottom: 15px;
        }
        .auth-input-group label {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: #38bdf8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .auth-field {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid #1e3a8a;
            padding: 12px;
            border-radius: 6px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: bold;
            outline: none;
            width: 100%;
        }
        .auth-field:focus {
            border-color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }
        #auth-error-msg {
            color: #ef4444;
            font-size: 13px;
            font-family: monospace;
            margin-bottom: 15px;
            text-align: center;
            min-height: 18px;
        }
        .auth-btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            margin-bottom: 20px;
        }
        .auth-btn {
            padding: 12px;
            font-size: 12px;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(180deg, #090d16 0%, #0f172a 100%);
            border: 1px solid #334155;
            color: #cbd5e1;
            text-align: center;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }
        .auth-btn.primary {
            background: linear-gradient(180deg, #1e1b4b 0%, #4f46e5 100%);
            border-color: #818cf8;
            color: #fff;
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.4);
        }
        .auth-btn:hover { border-color: #00d2ff; color: #fff; transform: translateY(-1px); }
        
        #start-info-box {
            width: 100%;
            max-width: 450px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px dashed #334155;
            padding: 12px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 12px;
            color: #94a3b8;
        }
        #start-info-box h4 { font-family: 'Orbitron', sans-serif; color: #00d2ff; font-size: 12px; margin-bottom: 6px; text-align: center;}
        #start-info-box ul { list-style: none; }
        #start-info-box li { margin-bottom: 3px; text-align: center; }

        /* Core Game HUD Dashboard Elements */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
            margin-bottom: 25px;
            font-size: 32px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        #hud-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            max-width: 1000px;
            background: linear-gradient(135deg, rgba(8, 14, 36, 0.95) 0%, rgba(3, 6, 17, 0.95) 100%);
            border: 1px solid #1e40af;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.15), inset 0 0 15px rgba(30, 64, 175, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            gap: 20px;
            position: relative;
        }
        .hud-column { display: flex; flex-direction: column; gap: 8px; font-size: 15px; font-weight: 700; text-transform: uppercase;}
        .hud-val { color: #00d2ff; text-shadow: 0 0 5px rgba(0,210,255,0.3); }
        .hud-column:nth-child(2) { align-items: center; justify-content: center; font-size: 26px; font-weight: 900; color: #ffbc00; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px rgba(255,188,0,0.4); text-align: center; line-height: 1.2;}
        .hud-column:nth-child(3) { align-items: flex-end; }
        
        /* 3D Sandbox Layout Arena Viewport */
        #sandbox-viewport {
            width: 100%;
            max-width: 1000px;
            height: 220px;
            background: #020409;
            border: 2px solid #1e293b;
            border-radius: 10px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
        }
        #sandbox-floor-bg {
            position: absolute;
            width: 100%; height: 100%;
            background-image: linear-gradient(rgba(30, 41, 59, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(30, 41, 59, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: perspective(200px) rotateX(60deg);
            transform-origin: top;
            top: 20px;
        }
        .entity-avatar {
            position: absolute;
            width: 32px; height: 32px;
            border-radius: 50%;
            transition: all 0.15s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 0 12px currentColor;
        }
        #jinwoo-token {
            background: #00d2ff; color: #00d2ff;
            border: 2px solid #ffffff;
            z-index: 10;
        }
        .enemy-token { background: #ef4444; color: #ef4444; border: 2px solid #000; }
        .shadow-token { background: #a855f7; color: #a855f7; border: 2px solid #3b0764; }

        /* System Action Grid Logs */
        #combat-view {
            width: 100%;
            max-width: 1000px;
            height: 140px;
            background: #010206;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        #combat-view h3 { font-family: 'Orbitron', sans-serif; font-size: 13px; color: #ef4444; border-bottom: 1px solid #1e293b; padding-bottom: 4px; display: flex; justify-content: space-between;}
        #combat-log { font-size: 13px; color: #94a3b8; overflow-y: auto; flex-grow: 1; font-family: monospace; white-space: pre-wrap; line-height: 1.4; }

        #controls-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            width: 100%;
            max-width: 1000px;
            gap: 15px;
        }
        .control-panel {
            background: rgba(6, 11, 28, 0.85);
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .control-panel h3 { font-family: 'Orbitron', sans-serif; font-size: 13px; color: #38bdf8; border-bottom: 1px solid #1e293b; padding-bottom: 6px; text-align: center; letter-spacing: 0.5px;}
        .scrollable-actions { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; padding-right: 2px; }

        .control-panel button {
            background: linear-gradient(180deg, #0f172a 0%, #090d16 100%);
            color: #cbd5e1;
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Rajdhani', sans-serif;
